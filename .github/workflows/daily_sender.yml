name: Daily Sender 06:30 BRT

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 9 * * *" # 09:30 UTC ~ 06:30 BRT

jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily_sender (DNS hardening)
        run: |
          set -e

          HOST="quggzwgrqacahcuqupx1.supabase.co"
          URL="https://${HOST}/functions/v1/daily_sender"

          # Resolve IP via DNS-over-HTTPS (evita falhas de DNS do runner)
          IP=$(python3 - <<'PY'
import json, urllib.request
host = "quggzwgrqacahcuqupx1.supabase.co"
u = f"https://dns.google/resolve?name={host}&type=A"
data = json.loads(urllib.request.urlopen(u, timeout=10).read().decode("utf-8"))
answers = data.get("Answer", [])
# pega o primeiro A record
for a in answers:
    if a.get("type") == 1 and a.get("data"):
        print(a["data"])
        break
PY
          )

          if [ -z "$IP" ]; then
            echo "Failed to resolve IP via DoH"
            exit 1
          fi

          echo "Resolved ${HOST} -> ${IP}"

          curl -i -sS --retry 5 --retry-all-errors --retry-delay 2 \
            --resolve "${HOST}:443:${IP}" \
            -X POST "${URL}" \
            -H "Content-Type: application/json" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --data '{}'
